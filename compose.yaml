services:
  api:
    build:
      context: .
      target: development
    ports:
      - "127.0.0.1:${API_PORT:-8787}:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: "mysql://hono:hono@db:3306/hono"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm run db:migrate && npm run dev"

  db:
    image: mysql:8.4
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: hono
      MYSQL_USER: hono
      MYSQL_PASSWORD: hono
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  openapi:
    image: swaggerapi/swagger-ui@sha256:135a9ced4005a947bbb1757bc509309d88519d985aa0f5616f4fdfab1eba6ff6
    ports:
      - "127.0.0.1:${OPENAPI_PORT:-8080}:8080"
    environment:
      SWAGGER_JSON: /openapi/openapi.yaml
    volumes:
      - ./openapi/openapi.yaml:/openapi/openapi.yaml:ro

  mock:
    image: stoplight/prism:4
    platform: linux/amd64
    ports:
      - "127.0.0.1:${MOCK_PORT:-4010}:4010"
    command: mock -h 0.0.0.0 /openapi/openapi.yaml
    volumes:
      - ./openapi/openapi.yaml:/openapi/openapi.yaml:ro

volumes:
  node_modules:
  mysql_data:
