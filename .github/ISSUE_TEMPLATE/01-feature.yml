name: 新規実装・機能改善
description: 新規機能の実装、既存機能の変更・改善。
title: ""
labels: ["作業:機能追加"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 実装・変更したい内容。
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: 対応する理由や解決したい課題。
  - type: textarea
    id: completion
    attributes:
      label: 完了条件
      description: 完了と判断する条件。
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: textarea
    id: approach
    attributes:
      label: 実装メモ
      description: 対象範囲、実装案、注意点など。必要な場合は機能設計書・ADRも記載。
  - type: textarea
    id: references
    attributes:
      label: 参考情報
      description: 関連Issue、機能設計書、ADR、ドキュメントなど。
