name: 新規実装・機能改善
description: 新規機能の実装、既存機能の変更・改善。
title: "[機能]: "
labels: ["種類:機能"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 対象領域
      description: 主な対象領域。作成後に対応する領域ラベルを付与。
      options:
        - フロントエンド（領域:フロントエンド）
        - バックエンド（領域:バックエンド）
        - 共通（領域:共通）
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 実装・変更したい内容。
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: 対応する理由や解決したい課題。
  - type: textarea
    id: completion
    attributes:
      label: 完了条件
      description: 完了と判断する条件。
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: textarea
    id: approach
    attributes:
      label: 実装メモ
      description: 画面・UI、API、対象範囲、実装案、注意点など。
  - type: textarea
    id: references
    attributes:
      label: 参考情報
      description: 関連Issue、設計資料、ドキュメントなど。
