name: 機能追加・改善
description: 新機能や既存機能の改善提案。
title: "[機能]: "
labels: ["type:feature", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        解決策を提案する前に、利用者が抱えている課題を説明してください。成果が明確で適切な大きさのIssueは、優先順位付けと実装がしやすくなります。
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題・改善機会
      description: 誰がどのような課題を抱えており、解決することにどのような価値がありますか？
      placeholder: 〇〇として、△△したい。なぜなら□□だから。
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: 期待する成果
      description: 実装方法だけでなく、実現後に確認できる成果を記載してください。
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件
      description: このIssueを完了と判断できる条件を記載してください。
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: 実現方法の案
      description: 任意で、実装案、API例、検討した代替案を記載してください。
  - type: textarea
    id: scope
    attributes:
      label: 対象範囲・対象外
      description: 対応に含める内容と、意図的に含めない内容を明確にしてください。
      placeholder: |
        対象:
        - ...

        対象外:
        - ...
  - type: textarea
    id: dependencies
    attributes:
      label: 依存関係・参考情報
      description: 関連Issue、設計資料、ドキュメント、外部資料などを記載してください。
