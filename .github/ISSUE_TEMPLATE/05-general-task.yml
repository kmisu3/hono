name: その他のタスク
description: 調査、ドキュメント、運用、調整などの作業。
title: "[タスク]: "
labels: ["作業:その他"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 対応したい内容。
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: 対応する理由や得たい成果。
  - type: textarea
    id: completion
    attributes:
      label: 完了条件
      description: 完了と判断する条件。
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: textarea
    id: notes
    attributes:
      label: 作業メモ
      description: 進め方、担当、期限、注意点など。
  - type: textarea
    id: references
    attributes:
      label: 参考情報
      description: 関連Issue、資料、ドキュメントなど。
