name: その他のタスク
description: 調査、ドキュメント、運用、調整などの作業管理。
title: "[タスク]: "
labels: ["type:task", "status:triage"]
body:
  - type: dropdown
    id: category
    attributes:
      label: カテゴリ
      options:
        - ドキュメント
        - 調査・検証
        - 運用
        - 調整・計画
        - リリース・周知
        - その他
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: 目的
      description: このタスクで得たい成果と、必要な理由を記載してください。
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: 成果物・完了条件
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: 進め方の案
      description: 必要な手順、制約、担当者、判断ポイントなどを記載してください。
  - type: textarea
    id: dependencies
    attributes:
      label: 依存関係・参考情報
      description: 関連作業へのリンクや、このタスクを妨げる可能性がある事項を記載してください。
  - type: input
    id: target_date
    attributes:
      label: 目標日
      description: 任意です。明確な期限がある場合は YYYY-MM-DD 形式で入力してください。
      placeholder: YYYY-MM-DD
