name: 設計・アーキテクチャ検討
description: API、アーキテクチャ、データモデル、技術方針の検討・意思決定。
title: "[設計]: "
labels: ["type:design", "status:triage"]
body:
  - type: textarea
    id: context
    attributes:
      label: 背景
      description: 現在の状況、制約、意思決定が必要な理由の記載。
  - type: textarea
    id: decision
    attributes:
      label: 決定すること
      description: この設計タスクで答えを出すべき問いの明確化。
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: 要件・制約
      placeholder: |
        - 機能要件:
        - 非機能要件:
        - 互換性:
        - 運用上の制約:
  - type: textarea
    id: options
    attributes:
      label: 選択肢・トレードオフ
      description: 実現可能な選択肢について、コスト、リスク、不採用案を含めた比較。
  - type: textarea
    id: deliverables
    attributes:
      label: 成果物・完了条件
      description: ADR、プロトタイプ、実装計画など、このタスクの完了条件の定義。
      placeholder: |
        - [ ] 決定事項を記録した
        - [ ] 後続の実装Issueを作成した
  - type: textarea
    id: references
    attributes:
      label: 参考情報
      description: 関連Issue、図、検証結果、外部ドキュメントなどの記載。
