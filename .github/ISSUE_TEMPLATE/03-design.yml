name: 設計・アーキテクチャ検討
description: UI、API、データモデル、技術方針などの検討。
title: "[設計]: "
labels: ["type:design"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 対象領域
      description: 主な対象領域。作成後に対応するareaラベルを付与。
      options:
        - フロントエンド（area:frontend）
        - バックエンド（area:backend）
        - 共通（area:common）
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 検討事項
      description: 決めたいこと、整理したいこと。
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: 検討が必要な理由や現在の課題。
  - type: textarea
    id: requirements
    attributes:
      label: 要件・制約
      description: 満たす必要がある要件や考慮すべき制約。
  - type: textarea
    id: options
    attributes:
      label: 検討内容
      description: 選択肢、メリット・デメリット、判断理由など。
  - type: textarea
    id: completion
    attributes:
      label: 完了条件
      description: 完了と判断する条件や成果物。
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: textarea
    id: references
    attributes:
      label: 参考情報
      description: 関連Issue、図、検証結果、ドキュメントなど。
