name: 設計・アーキテクチャ検討
description: UI、API、データモデル、技術方針などの検討。
labels: ["作業:設計"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 検討事項
      description: 決めたいこと、整理したいこと。
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: 検討が必要な理由や現在の課題。
  - type: textarea
    id: requirements
    attributes:
      label: 要件・制約
      description: 満たす必要がある要件や考慮すべき制約。
  - type: textarea
    id: options
    attributes:
      label: 検討内容
      description: 選択肢、メリット・デメリット、判断理由、機能設計書・ADRの要否など。
  - type: textarea
    id: completion
    attributes:
      label: 完了条件
      description: 完了と判断する条件や、機能設計書・ADRなど必要な成果物。
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: textarea
    id: references
    attributes:
      label: 参考情報
      description: 関連Issue、機能設計書、ADR、図、検証結果、ドキュメントなど。
