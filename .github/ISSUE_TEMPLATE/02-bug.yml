name: 不具合対応
description: 不具合や想定外の動作への対応。
title: "[不具合]: "
labels: ["作業:不具合対応"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 変更対象
      description: 主な変更対象。作成後に対応する対象ラベルを付与。
      options:
        - フロントエンド（対象:フロントエンド）
        - バックエンド（対象:バックエンド）
        - 共通（対象:共通）
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 不具合の内容
      description: 発生している事象と影響。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来想定される動作。
  - type: textarea
    id: reproduction
    attributes:
      label: 再現方法
      description: 再現手順、条件、再現用コードなど。
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: textarea
    id: environment
    attributes:
      label: 環境・ログ
      description: OS、ブラウザ、端末、実行環境、バージョン、ログ、スクリーンショットなど。
  - type: textarea
    id: notes
    attributes:
      label: 対応メモ
      description: 原因の見立て、修正案、影響範囲、注意点など。
  - type: textarea
    id: references
    attributes:
      label: 参考情報
      description: 関連Issue、ドキュメントなど。
