name: 不具合報告
description: 再現可能な不具合や想定外の動作報告。
title: "[不具合]: "
labels: ["type:bug", "status:triage"]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: 報告前の確認
      options:
        - label: 同じ問題が既存Issueにないことを確認しました。
          required: true
        - label: ログや例から秘密情報・機密情報を削除しました。
          required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: 現在の動作
      description: 何が起きましたか？分かる範囲で影響範囲や発生頻度も記載してください。
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: 期待する動作
      description: 本来はどのように動作するべきですか？
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      description: 問題を確実に再現できる最小限の手順、または再現用コードを記載してください。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 実行環境
      description: 関係するバージョンや設定を記載してください。
      value: |
        - OS:
        - Node.js:
        - パッケージマネージャー:
        - コミット/バージョン:
      render: markdown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: ログ・補足情報
      description: 関連するログ、スクリーンショット、リンクを記載してください。秘密情報は含めないでください。
      render: shell
  - type: dropdown
    id: severity
    attributes:
      label: 想定する深刻度
      description: 最終的な優先度はトリアージ時に確認します。
      options:
        - 主要機能が利用不能、またはデータ・セキュリティ上のリスクがある
        - 重要な機能が利用できない
        - 影響が限定的、または回避策がある
        - 軽微、または見た目のみの問題
    validations:
      required: true
