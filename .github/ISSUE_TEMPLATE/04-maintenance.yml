name: 保守・リファクタリング
description: コード、依存関係、ツール、開発環境などの保守・改善。
title: ""
labels: ["作業:保守"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 対応したい内容。
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: 対応する理由や解消したい問題。
  - type: textarea
    id: completion
    attributes:
      label: 完了条件
      description: 完了と判断する条件。
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: textarea
    id: notes
    attributes:
      label: 対応メモ
      description: 対象範囲、対応案、影響、注意点など。共通方針を変える場合はADRも記載。
  - type: textarea
    id: references
    attributes:
      label: 参考情報
      description: 関連Issue、指標、ドキュメントなど。
