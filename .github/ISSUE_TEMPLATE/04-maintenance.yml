name: 保守・リファクタリング
description: コード、依存関係、ツール、開発環境などの保守・改善。
title: "[保守]: "
labels: ["type:maintenance"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 対象領域
      description: 主な対象領域。作成後に対応するareaラベルを付与。
      options:
        - フロントエンド（area:frontend）
        - バックエンド（area:backend）
        - 共通（area:common）
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 対応したい内容。
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: 対応する理由や解消したい問題。
  - type: textarea
    id: completion
    attributes:
      label: 完了条件
      description: 完了と判断する条件。
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: textarea
    id: notes
    attributes:
      label: 対応メモ
      description: 対象範囲、対応案、影響、注意点など。
  - type: textarea
    id: references
    attributes:
      label: 参考情報
      description: 関連Issue、指標、ドキュメントなど。
